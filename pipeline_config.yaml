bucket: bronze
bucket_silver: silver

datasets:

  eav:
    base_prefix: eav
    files_prefix: eav/files/
    allowed_sub_prefixes: [files, auxiliary, delta]
    expected_prefixes:
      - eav/files/
      - eav/auxiliary/
      - eav/delta/
    files_table: eav/delta/eav_files_metadata
    aux_table:   eav/delta/auxiliary_metadata
    entity_id_column: entity_id
    entity_count_min: 1
    modality_column: modality
    expected_modalities: [audio, video, eeg]
    files_expected_columns:
      [file_id, dataset, entity_id, modality, file_path, file_name, ingestion_time, ingest_ts]
    aux_expected_columns:
      [record_id, dataset, category, source_path, file_name, related_entity, ingestion_time, ingest_ts]
    # Silver — entity
    id_pattern: "^subject(\\d+)$"
    silver_base_prefix: 01_entity_resolution/eav
    silver_files_table: 01_entity_resolution/eav/delta/eav_files_metadata

  kemocon:
    base_prefix: k-emocon
    files_prefix: k-emocon/files/
    allowed_sub_prefixes: [files, auxiliary, delta]
    expected_prefixes:
      - k-emocon/files/
      - k-emocon/auxiliary/
      - k-emocon/delta/
    files_table: k-emocon/delta/k_emocon_files_metadata
    aux_table:   k-emocon/delta/auxiliary_metadata
    entity_id_column: entity_id
    entity_count_min: 1
    modality_column: modality
    expected_modalities: [audio, video, eeg, biosignal]
    files_expected_columns:
      [file_id, dataset, entity_id, modality, file_path, file_name, ingestion_time, ingest_ts]
    aux_expected_columns:
      [record_id, dataset, category, source_path, file_name, related_entity, ingestion_time, ingest_ts]
    # Silver — entity
    id_pattern: "^p?(\\d+)$"
    dyadic_separator: "_"
    silver_base_prefix: 01_entity_resolution/k-emocon
    silver_files_table: 01_entity_resolution/k-emocon/delta/k_emocon_files_metadata

# ---------------------------------------------------------------------------
# Silver — Step 02: Time Audit
# ---------------------------------------------------------------------------
time_audit:
  output_prefix: "02_time_audit/metadata"
  output_filename: "time_audit.csv"

  datasets:

    kemocon:
      dataset_label: "K-EmoCon"
      silver_files_prefix: "01_entity_resolution/k-emocon/files"
      subjects_bucket: "bronze"
      subjects_path: "k-emocon/auxiliary/metadata/metadata/subjects.csv"
      timestamp_col: "timestamp"
      timestamp_unit_ms: true   # timestamps are Unix milliseconds
      signals:
        "E4_BVP.csv":
          signal_type: "E4_BVP"
          device: "Empatica E4"
          modality: "physio"
          declared_hz: 64.0
        "E4_EDA.csv":
          signal_type: "E4_EDA"
          device: "Empatica E4"
          modality: "physio"
          declared_hz: 4.0
        "E4_ACC.csv":
          signal_type: "E4_ACC"
          device: "Empatica E4"
          modality: "physio"
          declared_hz: 32.0
        "E4_HR.csv":
          signal_type: "E4_HR"
          device: "Empatica E4"
          modality: "physio"
          declared_hz: 1.0
        "E4_IBI.csv":
          signal_type: "E4_IBI"
          device: "Empatica E4"
          modality: "physio"
          declared_hz: null   # irregular — sampling rate measured from data
        "E4_TEMP.csv":
          signal_type: "E4_TEMP"
          device: "Empatica E4"
          modality: "physio"
          declared_hz: 4.0
        "BrainWave.csv":
          signal_type: "BrainWave"
          device: "NeuroSky"
          modality: "eeg"
          declared_hz: null   # ~1 Hz processed output — measured from data
        "Polar_HR.csv":
          signal_type: "Polar_HR"
          device: "Polar H7"
          modality: "physio"
          declared_hz: 1.0
      audio_signal:
        signal_type: "audio"
        device: "smartphone"
        modality: "audio"
      video_signal:
        signal_type: "video"
        device: "smartphone"
        modality: "video"

    eav:
      dataset_label: "EAV"
      silver_files_prefix: "01_entity_resolution/eav/files"
      eeg_signal:
        signal_type: "eeg"
        device: "BrainAmp"
        modality: "eeg"
        declared_hz: 500.0
        label_suffix: "_label"    # skip mat files whose stem ends with this
        timepoints_axis: 0        # scipy.io.whosmat: shape[0] = n_timepoints
        instances_axis: 2         # scipy.io.whosmat: shape[2] = n_instances
      audio_signal:
        signal_type: "audio"
        device: "microphone"
        modality: "audio"
      video_signal:
        signal_type: "video"
        device: "webcam"
        modality: "video"
      trial_id_pattern: "^(\\d+)_"   # extracts leading digits as trial ID from filename
